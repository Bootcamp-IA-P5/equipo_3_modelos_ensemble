name: CI - Smoke tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install minimal dependencies for smoke tests
        run: |
          python -m pip install --upgrade pip
          # If a special minimal requirements file exists, install it
          if [ -f tests/requirements-ci.txt ]; then
            pip install -r tests/requirements-ci.txt
          else
            # Fallback: install a small set of packages likely needed by the scripts
            pip install pytest pillow pandas numpy scikit-learn joblib
          fi

      - name: Run smoke tests (pytest)
        run: |
          pytest -q --maxfail=1 tests/smoke_test.py
          